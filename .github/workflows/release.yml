name: Release NuGet Packages

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Pack solution
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          dotnet pack DataProvider.sln -c Release -p:Version="$VERSION" -o ./nupkgs

      - name: Push packages to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY secret is not set." >&2
            exit 1
          fi
          shopt -s nullglob
          packages=(./nupkgs/*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "No packages produced — failing." >&2
            exit 1
          fi
          for pkg in "${packages[@]}"; do
            echo "::group::Push $pkg"
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

  deploy-lql-website:
    needs: publish
    uses: ./.github/workflows/deploy-lql-website.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  deploy-website:
    needs: deploy-lql-website
    uses: ./.github/workflows/deploy-website.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
