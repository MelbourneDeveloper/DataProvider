services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: Samples/docker/Dockerfile.app
    environment:
      ConnectionStrings__Postgres: Host=db;Database=gatekeeper;Username=gatekeeper;Password=${DB_PASSWORD:-changeme}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      Fido2__ServerName: Healthcare Platform
      Fido2__ServerDomain: localhost
      Fido2__Origins__0: http://localhost:5173
      ConnectionStrings__Postgres_Clinical: Host=db;Database=clinical;Username=clinical;Password=${DB_PASSWORD:-changeme}
      ConnectionStrings__Postgres_Scheduling: Host=db;Database=scheduling;Username=scheduling;Password=${DB_PASSWORD:-changeme}
      ConnectionStrings__Postgres_ICD10: Host=db;Database=icd10;Username=icd10;Password=${DB_PASSWORD:-changeme}
      CLINICAL_CONNECTION_STRING: Host=db;Database=clinical;Username=clinical;Password=${DB_PASSWORD:-changeme}
      SCHEDULING_CONNECTION_STRING: Host=db;Database=scheduling;Username=scheduling;Password=${DB_PASSWORD:-changeme}
      SCHEDULING_API_URL: http://localhost:5001
      CLINICAL_API_URL: http://localhost:5080
      Gatekeeper__BaseUrl: http://localhost:5002
      Services__ClinicalApi: http://localhost:5080
      Services__SchedulingApi: http://localhost:5001
    ports:
      - "5002:5002"
      - "5080:5080"
      - "5001:5001"
      - "5090:5090"
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ../..
      dockerfile: Samples/docker/Dockerfile.dashboard
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  db-data:
